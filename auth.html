<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Sign Up - Exotic Veggies</title>
    <link rel="stylesheet" href="../css/forms.css">
<div id="google_translate_element"></div>
</head>

<body>
    <div class="container">
        
        <!-- Sign Up Section (Visible by default) -->
        <div class="form-box" id="signupSection">
            <h2>Sign Up</h2>
            <form id="signupForm">
                <input type="text" id="signupUsername" placeholder="Username" required>
                <input type="email" id="signupEmail" placeholder="Email Address" required>
                <input type="password" id="signupPassword" placeholder="Password" required>
                <button type="submit">Sign Up</button>
            </form>
            <p id="signupMessage" class="message"></p>
            <p class="toggle-text">Already a user? <span id="showLogin" class="toggle-link">LOGIN</span></p>
        </div>

        <!-- Login Section (Hidden by default) -->
        <div class="form-box hidden" id="loginSection">
            <h2>Login</h2>
            <form id="loginForm">
                <input type="email" id="loginEmail" placeholder="Email Address" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
            <p id="loginMessage" class="message"></p>
            <p class="toggle-text">Don't have an account? <span id="showSignup" class="toggle-link">SIGN UP</span></p>
        </div>

    </div>


    <script src="../js/auth.js"></script>


    <script src="../js/translator.js"></script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
